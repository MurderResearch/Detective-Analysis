name: Post daily article to Facebook

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/fb-summaries/latest.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post-fb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Post to Facebook
        env:
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_GRAPH_VERSION: ${{ secrets.FB_GRAPH_VERSION }}
        run: python3 scripts/post-to-fb.py

      - name: Commit FB post record if updated
        run: |
          if git diff --quiet docs/fb-summaries/fb-posted.json; then
            echo "No change to fb-posted.json."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/fb-summaries/fb-posted.json
            git commit -m "$(TZ='Asia/Taipei' date '+%Y-%m-%d') FB 發文紀錄 (via GH Actions)"
            git push
          fi

      - name: Notify Telegram (success)
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TITLE=$(python3 -c "import json; print(json.load(open('docs/fb-summaries/fb-posted.json'))['title'])" 2>/dev/null || echo "unknown")
          POST_ID=$(python3 -c "import json; print(json.load(open('docs/fb-summaries/fb-posted.json'))['post_id'])" 2>/dev/null || echo "")
          DATE=$(TZ='Asia/Taipei' date '+%Y-%m-%d')
          MSG="✅ ${DATE} 每日分析發布完成
📖 ${TITLE}
🔗 https://www.facebook.com/${POST_ID}
🌐 https://murderresearch.github.io/Detective-Analysis/"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" > /dev/null

      - name: Notify Telegram (failure)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DATE=$(TZ='Asia/Taipei' date '+%Y-%m-%d')
          MSG="❌ ${DATE} FB 發文 workflow 失敗
Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" > /dev/null
