<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 500px;
    height: 500px;
    overflow: hidden;
    background: #0a0a0f;
  }
  .container {
    width: 500px;
    height: 500px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #1a1025 0%, #0a0a0f 70%);
  }
  /* Decorative circles */
  .circle-outer {
    position: absolute;
    width: 420px;
    height: 420px;
    border: 1px solid rgba(180, 140, 60, 0.3);
    border-radius: 50%;
    top: 40px; left: 40px;
  }
  .circle-inner {
    position: absolute;
    width: 340px;
    height: 340px;
    border: 1px solid rgba(180, 140, 60, 0.15);
    border-radius: 50%;
    top: 80px; left: 80px;
  }
  /* Magnifying glass SVG */
  .icon-wrap {
    position: relative;
    z-index: 2;
    margin-bottom: 20px;
  }
  /* Main title */
  .title {
    font-family: 'Noto Serif TC', serif;
    font-weight: 900;
    font-size: 52px;
    letter-spacing: 12px;
    color: #e8d5a3;
    text-shadow: 0 0 30px rgba(200, 160, 80, 0.4);
    position: relative;
    z-index: 2;
    line-height: 1.2;
  }
  .title span {
    display: block;
    text-align: center;
  }
  /* Divider line */
  .divider {
    width: 180px;
    height: 1px;
    background: linear-gradient(to right, transparent, #c8a050, transparent);
    margin: 14px auto;
    position: relative;
    z-index: 2;
  }
  .divider::before, .divider::after {
    content: '◆';
    position: absolute;
    top: -7px;
    font-size: 8px;
    color: #c8a050;
  }
  .divider::before { left: 30px; }
  .divider::after { right: 30px; }
  /* Subtitle */
  .subtitle {
    font-family: 'Noto Serif TC', serif;
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 5px;
    color: rgba(200, 160, 80, 0.6);
    position: relative;
    z-index: 2;
  }
  /* Corner decorations */
  .corner {
    position: absolute;
    width: 40px;
    height: 40px;
    opacity: 0.4;
  }
  .corner-tl { top: 30px; left: 30px; border-top: 2px solid #c8a050; border-left: 2px solid #c8a050; }
  .corner-tr { top: 30px; right: 30px; border-top: 2px solid #c8a050; border-right: 2px solid #c8a050; }
  .corner-bl { bottom: 30px; left: 30px; border-bottom: 2px solid #c8a050; border-left: 2px solid #c8a050; }
  .corner-br { bottom: 30px; right: 30px; border-bottom: 2px solid #c8a050; border-right: 2px solid #c8a050; }
</style>
</head>
<body>
<div class="container">
  <div class="circle-outer"></div>
  <div class="circle-inner"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="icon-wrap">
    <svg width="70" height="70" viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Magnifying glass -->
      <circle cx="28" cy="28" r="20" stroke="#c8a050" stroke-width="2.5" fill="none" opacity="0.9"/>
      <circle cx="28" cy="28" r="13" stroke="#c8a050" stroke-width="1" fill="rgba(200,160,80,0.05)" opacity="0.6"/>
      <line x1="43" y1="43" x2="62" y2="62" stroke="#c8a050" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
      <!-- Inner detail: eye -->
      <circle cx="28" cy="28" r="4" fill="#c8a050" opacity="0.7"/>
      <line x1="20" y1="28" x2="25" y2="28" stroke="#c8a050" stroke-width="1" opacity="0.5"/>
      <line x1="31" y1="28" x2="36" y2="28" stroke="#c8a050" stroke-width="1" opacity="0.5"/>
    </svg>
  </div>

  <div class="title">
    <span>推理</span>
    <span>解剖室</span>
  </div>
  <div class="divider"></div>
  <div class="subtitle">DETECTIVE DISSECTION</div>
</div>
</body>
</html>
